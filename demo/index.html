<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kinematics — 2D Physics Lab (C++/WASM)</title>
    <link rel="stylesheet" href="app.css" />
</head>
<body>
    <div class="lab">
        <header class="lab-header">
            <span class="lab-title">Kinematics</span>
            <span class="lab-sub">2D Physics Engine — C++ / WebAssembly</span>
        </header>

        <div class="lab-body">
            <nav class="lab-nav">
                <p class="nav-label">Demos</p>
                <div id="nav-items"></div>
            </nav>

            <main class="lab-canvas-wrap">
                <canvas id="demo-canvas" width="800" height="560"></canvas>
            </main>

            <aside class="lab-panel">
                <div class="panel-section">
                    <p class="panel-label">Scene</p>
                    <p class="panel-scene-name" id="scene-name">—</p>
                    <p class="panel-scene-desc" id="scene-desc"></p>
                </div>

                <div class="panel-section">
                    <p class="panel-label">Stats</p>
                    <div class="stat"><span>Frame</span><span id="stat-frame">0</span></div>
                    <div class="stat"><span>FPS</span><span id="stat-fps">0</span></div>
                    <div class="stat"><span id="stat-label">Pos Y</span><span id="stat-value">0.00</span></div>
                    <div class="stat"><span>Engine</span><span>C++ WASM</span></div>
                </div>

                <div class="panel-section">
                    <p class="panel-label">Controls</p>
                    <button class="btn-reset" id="btn-reset">↺ Reset</button>
                    <p class="hint">Click / tap to push</p>
                </div>

                <div class="panel-section">
                    <p class="panel-label">Impulse — <span id="impulse-label">10</span> m/s</p>
                    <input class="slider" type="range" min="1" max="50" step="1" value="10" id="impulse-slider" />
                </div>
            </aside>
        </div>
    </div>

    <!-- Emscripten module factory (generated by build.sh) -->
    <script src="kinematics.js"></script>
    <script src="app.js"></script>
</body>
</html>
