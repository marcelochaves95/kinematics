name: Deploy demo to GitHub Pages

# Builds the C++ engine to WebAssembly with Emscripten and publishes the
# static demo (demo/) to GitHub Pages.
#
# Requires: repo Settings → Pages → "Build and deployment" → Source = GitHub Actions.

on:
  push:
    branches: [main]
  workflow_dispatch:            # allows manual runs from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; newer pushes cancel in-flight runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 6.0.0   # pinned for reproducible builds (don't use 'latest')

      - name: Build WASM
        run: bash demo/build.sh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: demo

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
